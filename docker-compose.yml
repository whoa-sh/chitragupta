name: chitragupta

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chitragupta-app:local
    container_name: chitragupta-app
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=${APP_TMPFS_SIZE:-64m}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: ${APP_PIDS_LIMIT:-256}
    mem_limit: ${APP_MEM_LIMIT:-768m}
    cpus: "${APP_CPUS:-1.0}"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      JAVA_OPTS: ${JAVA_OPTS:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-chitragupta}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-chitragupta}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-chitragupta_dev_password}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - chitragupta-net

  postgres:
    image: postgres:17-alpine
    container_name: chitragupta-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chitragupta}
      POSTGRES_USER: ${POSTGRES_USER:-chitragupta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chitragupta_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - chitragupta-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chitragupta} -d ${POSTGRES_DB:-chitragupta}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - chitragupta-net

volumes:
  chitragupta-postgres-data:

networks:
  chitragupta-net:
    name: chitragupta-net
