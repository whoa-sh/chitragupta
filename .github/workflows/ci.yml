name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ktlint)
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: "21"

      - name: Set up Gradle Cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Ktlint Check
        run: ./gradlew --no-daemon ktlintCheck

  build_test:
    name: Build & Test (Gradle)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: "21"

      - name: Set up Gradle Cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Build and Test
        run: ./gradlew --no-daemon clean test build

  docker_smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build App Image with Cache
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: chitragupta-app:local
          cache-from: type=gha,scope=docker-smoke
          cache-to: type=gha,mode=max,scope=docker-smoke

      - name: Docker Compose Start (No Build)
        run: docker compose up -d --no-build

      - name: Wait for Health
        run: |
          status="starting"
          for _ in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' chitragupta-app || echo "missing")
            if [ "$status" = "healthy" ]; then
              break
            fi
            sleep 3
          done
          test "$status" = "healthy"

      - name: Show Compose Status
        run: docker compose ps

      - name: Teardown
        if: always()
        run: docker compose down -v
